name: Code QA Kilo Code

on:
    workflow_dispatch:
    pull_request_review:
      types: [submitted]

env:
    NODE_VERSION: 20.19.2
    PNPM_VERSION: 10.8.1
    TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
    TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

permissions:
  contents: read

jobs:
    compile:
        if: github.event.review.state == 'approved' || github.event_name == 'workflow_dispatch'
        defaults:
          run:
              working-directory: agent8
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  path: agent8
            - name: Checkout MCP
              uses: actions/checkout@v4
              with:
                  repository: 8thwall/mcp8
                  ref: main
                  path: 8w-mcp
                  token: ${{ secrets.KILO_READ_MCP }}
            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "pnpm"
                  cache-dependency-path: agent8/pnpm-lock.yaml
            - name: Turbo cache setup
              uses: actions/cache@v4
              with:
                  path: .turbo
                  key: ${{ runner.os }}-turbo-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-
            - name: Install dependencies
              run: pnpm install
            - name: Install MCP dependencies
              working-directory: 8w-mcp
              run: npm install
            - name: Build
              run: pnpm build
            - name: Check types
              run: pnpm check-types
            - name: Lint
              run: pnpm lint

    check-translations:
        if: github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "18"
                  cache: "pnpm"
            - name: Turbo cache setup
              uses: actions/cache@v4
              with:
                  path: .turbo
                  key: ${{ runner.os }}-turbo-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-
            - name: Install dependencies
              run: pnpm install
            - name: Verify all translations are complete
              run: node scripts/find-missing-translations.js

    test-extension:
        if: github.event.review.state == 'approved' || github.event_name == 'workflow_dispatch'
        defaults:
          run:
              working-directory: agent8
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ubuntu-latest]
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  path: agent8
            - name: Checkout MCP
              uses: actions/checkout@v4
              with:
                  repository: 8thwall/mcp8
                  ref: main
                  path: 8w-mcp
                  token: ${{ secrets.KILO_READ_MCP }}
            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "pnpm"
                  cache-dependency-path: agent8/pnpm-lock.yaml
            - name: Turbo cache setup
              uses: actions/cache@v4
              with:
                  path: .turbo
                  key: ${{ runner.os }}-turbo-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-
            - name: Install dependencies
              run: pnpm install
            - name: Install MCP dependencies
              working-directory: 8w-mcp
              run: npm install
            - name: Build (to build and copy WASM files)
              run: pnpm build
            - name: Run unit tests
              working-directory: agent8/src
              run: pnpm test

    test-webview:
        if: github.event.review.state == 'approved' || github.event_name == 'workflow_dispatch'
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ubuntu-latest]
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "18"
                  cache: "pnpm"
            - name: Turbo cache setup
              uses: actions/cache@v4
              with:
                  path: .turbo
                  key: ${{ runner.os }}-turbo-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-
            - name: Install dependencies
              run: pnpm install
            - name: Run unit tests
              working-directory: webview-ui
              run: pnpm test

    unit-test:
        needs: [test-extension, test-webview]
        runs-on: ubuntu-latest
        steps:
            - name: NO-OP
              run: echo "All unit tests passed."
